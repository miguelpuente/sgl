{% extends 'base.html' %}
{% load static %}

{% block titulo %} Preparado {% endblock titulo %}
{% block css %} {% static 'paginas/contestado/css/preparado.css' %} {% endblock css %}

<link rel='stylesheet' href={% static 'paginas/contestado/css/preparado.css' %}>

{% block contenido %}

    <section class="container">
        <h1>En Preparación</h1>
        <form id="info-form">

            <section class='form-group'>
                <label for="fecha preparado">Fecha Preparado:</label>
                <input type="date" id="fecha_preparado" value="2023-01-01" min="2023-01-01" max="2025-12-31" />
            </section>

            <section class='form-group'>
                <label for="comentarios">Comentarios:</label>
                <input type="text" id="comentarios" name="comentarios" />
            </section>

            <section class='form-group'>
                <label for="numero nota pedido">Número Nota Pedido:</label>
                <input type="number" id="numero_nota_pedido" name="numero-nota-pedido" required />
            </section>

            <!-- Agrega los campos restantes de manera similar -->
            <button type="reset">Limpiar</button>
            <button type="submit">Guardar Información</button>
        </form>
    </section>

{% endblock contenido %}
